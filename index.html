<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shokirov Matyoqub — IT GENIUS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0D1B2A;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 24px;
    background-image:
      linear-gradient(rgba(30,143,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,143,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .card {
    width: 100%;
    max-width: 400px;
    background: #0D1B2A;
    border: 0.5px solid rgba(30,143,255,0.2);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: #1E8FFF;
  }

  .top {
    padding: 36px 32px 28px;
    position: relative;
  }

  .logo {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-bottom: 28px;
  }
  .logo span { color: #1E8FFF; }

  .avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(30,143,255,0.12);
    border: 1px solid rgba(30,143,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 500;
    color: #1E8FFF;
    margin-bottom: 16px;
    letter-spacing: 0.02em;
  }

  .name {
    font-size: 26px;
    font-weight: 600;
    color: #ffffff;
    line-height: 1.1;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }

  .role {
    font-size: 11px;
    color: #1E8FFF;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .company {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.04em;
  }

  .divider {
    height: 0.5px;
    background: rgba(255,255,255,0.07);
    margin: 0 32px;
  }

  .contacts {
    padding: 24px 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .contact-link {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    padding: 12px 16px;
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    border: 0.5px solid rgba(255,255,255,0.06);
    transition: background 0.2s, border-color 0.2s;
  }

  .contact-link:hover {
    background: rgba(30,143,255,0.08);
    border-color: rgba(30,143,255,0.2);
  }

  .contact-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .contact-icon svg { width: 18px; height: 18px; }

  .icon-phone { background: rgba(30,143,255,0.12); }
  .icon-wa { background: rgba(37,211,102,0.12); }
  .icon-tg { background: rgba(0,136,204,0.12); }
  .icon-mail { background: rgba(255,107,26,0.1); }
  .icon-web { background: rgba(255,255,255,0.06); }

  .contact-info { flex: 1; }
  .contact-label {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .contact-value {
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    letter-spacing: 0.01em;
  }

  .arrow {
    opacity: 0.2;
    flex-shrink: 0;
  }

  .save-btn {
    margin: 0 32px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px;
    background: #1E8FFF;
    color: #fff;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    letter-spacing: 0.02em;
    cursor: pointer;
    border: none;
    width: calc(100% - 64px);
    transition: opacity 0.2s;
  }

  .save-btn:hover { opacity: 0.88; }

  .footer {
    padding: 16px 32px 24px;
    border-top: 0.5px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .footer-logo {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.2);
  }
  .footer-logo span { color: rgba(30,143,255,0.5); }
</style>

<script>
function saveContact() {
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'FN:Shokirov Matyoqub',
    'N:Shokirov;Matyoqub;;;',
    'ORG:IT GENIUS',
    'TITLE:CEO & Founder',
    'TEL;TYPE=CELL:+998978007147',
    'TEL;TYPE=WORK:+998978007147',
    'EMAIL:matyokubshokirov@gmail.com',
    'URL:https://itgenius.uz',
    'X-SOCIALPROFILE;type=telegram:@matyoqub_work',
    'END:VCARD'
  ].join('\n');

  const blob = new Blob([vcard], { type: 'text/vcard' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Shokirov_Matyoqub.vcf';
  a.click();
  URL.revokeObjectURL(url);
}
</script>
