<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shokirov Matyoqub — IT GENIUS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0D1B2A; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 24px; background-image: linear-gradient(rgba(30,143,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(30,143,255,0.04) 1px, transparent 1px); background-size: 40px 40px; }
  .card { width: 100%; max-width: 400px; background: #0D1B2A; border: 0.5px solid rgba(30,143,255,0.2); border-radius: 20px; overflow: hidden; position: relative; }
  .card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: #1E8FFF; z-index: 2; }
  .hero { width: 100%; height: 260px; position: relative; overflow: hidden; }
  .hero img { width: 100%; height: 100%; object-fit: contain; object-position: center top; display: block; background: #1a2535; }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, #0D1B2A 100%); }
  .hero-logo { position: absolute; top: 16px; left: 20px; font-size: 12px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.75); z-index: 1; }
  .hero-logo span { color: #1E8FFF; }
  .info { padding: 8px 32px 20px; text-align: center; }
  .name { font-size: 24px; font-weight: 600; color: #fff; margin-bottom: 5px; letter-spacing: -0.01em; }
  .role { font-size: 10px; color: #1E8FFF; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 2px; }
  .company { font-size: 11px; color: rgba(255,255,255,0.3); }
  .divider { height: 0.5px; background: rgba(255,255,255,0.07); margin: 0 32px; }
  .socials { padding: 16px 24px 8px; display: flex; flex-direction: column; gap: 8px; }
  .btn { display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; padding: 14px 16px; border-radius: 12px; border: 0.5px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); font-size: 14px; font-weight: 500; color: #fff; transition: all 0.2s; min-height: 52px; cursor: pointer; font-family: inherit; width: 100%; }
  .btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
  .icon { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .icon svg { width: 14px; height: 14px; }
  .btn-wa .icon { background: rgba(37,211,102,0.15); }
  .btn-tg .icon { background: rgba(0,136,204,0.15); }
  .btn-wc .icon { background: rgba(9,187,7,0.15); }
  .btn-mail .icon { background: rgba(255,107,26,0.12); }
  .btn-web .icon { background: rgba(255,255,255,0.08); }
  .btn-addr .icon { background: rgba(30,143,255,0.12); }
  .save-btn { margin: 16px 24px 24px; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; background: #1E8FFF; color: #fff; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; width: calc(100% - 48px); transition: opacity 0.2s; font-family: inherit; min-height: 52px; }
  .save-btn:hover { opacity: 0.88; }
  .footer { padding: 14px 32px 20px; border-top: 0.5px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; }
  .fl { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; color: rgba(255,255,255,0.2); }
  .fl span { color: rgba(30,143,255,0.5); }
  .wc-modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); align-items: center; justify-content: center; }
  .wc-modal.open { display: flex; }
  .wc-box { background: #0D1B2A; border: 0.5px solid rgba(30,143,255,0.25); border-radius: 20px; padding: 28px 24px; text-align: center; max-width: 300px; width: 90%; }
  .wc-box h3 { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 6px; }
  .wc-box p { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 20px; line-height: 1.5; }
  .wc-qr { width: 230px; height: 230px; background: #fff; border-radius: 12px; padding: 10px; margin: 0 auto 20px; }
  .wc-qr img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; display: block; }
  .wc-close { display: flex; align-items: center; justify-content: center; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); font-size: 14px; cursor: pointer; font-family: inherit; width: 100%; }
  .wc-close:hover { background: rgba(255,255,255,0.1); }
</style>
</head>
