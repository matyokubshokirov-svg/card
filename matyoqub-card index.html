<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0D1B2A; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px; background-image: linear-gradient(rgba(30,143,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(30,143,255,0.04) 1px, transparent 1px); background-size: 40px 40px; }
  .card { width: 100%; max-width: 400px; background: #0D1B2A; border: 0.5px solid rgba(30,143,255,0.2); border-radius: 20px; overflow: hidden; position: relative; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: #1E8FFF; z-index: 2; }
  .hero { width: 100%; height: 220px; position: relative; overflow: hidden; }
  .hero img { width: 100%; height: 100%; object-fit: cover; object-position: center 15%; display: block; }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, #0D1B2A 100%); }
  .hero-logo { position: absolute; top: 16px; left: 20px; font-size: 12px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.75); z-index: 1; }
  .hero-logo span { color: #1E8FFF; }
  .info { padding: 12px 32px 20px; text-align: center; }
  .name { font-size: 24px; font-weight: 600; color: #fff; margin-bottom: 5px; letter-spacing: -0.01em; }
  .role { font-size: 10px; color: #1E8FFF; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 2px; }
  .company { font-size: 11px; color: rgba(255,255,255,0.3); }
  .divider { height: 0.5px; background: rgba(255,255,255,0.07); margin: 0 32px; }
  .contacts { padding: 16px 32px 24px; display: flex; flex-direction: column; gap: 10px; }
  .cl { display: flex; align-items: center; gap: 14px; text-decoration: none; padding: 11px 14px; border-radius: 10px; background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.06); transition: background 0.2s, border-color 0.2s; }
  .cl:hover { background: rgba(30,143,255,0.08); border-color: rgba(30,143,255,0.2); }
  .ci { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ci svg { width: 17px; height: 17px; }
  .ip{background:rgba(30,143,255,0.12);}.iw{background:rgba(37,211,102,0.12);}.itg{background:rgba(0,136,204,0.12);}.im{background:rgba(255,107,26,0.1);}.ig{background:rgba(255,255,255,0.06);}
  .ct{flex:1;}.cl2{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:1px;}.cv{font-size:13px;color:rgba(255,255,255,0.8);}
  .arr{opacity:0.2;flex-shrink:0;}
  .save-btn { margin: 4px 32px 28px; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; background: #1E8FFF; color: #fff; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; width: calc(100% - 64px); transition: opacity 0.2s; font-family: inherit; }
  .save-btn:hover{opacity:0.88;}
  .footer { padding: 14px 32px 20px; border-top: 0.5px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; }
  .fl{font-size:11px;font-weight:500;letter-spacing:0.14em;color:rgba(255,255,255,0.2);}.fl span{color:rgba(30,143,255,0.5);}
</style>
